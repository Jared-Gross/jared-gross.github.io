    <script defer src="/index.js"></script>

    <script>
    document.addEventListener("DOMContentLoaded", async () => {
        const main = document.querySelector("main");

        const section = document.createElement("div");

        try {
            const res = await fetch("/RESUME.md");
            if (!res.ok) throw new Error("Failed to load RESUME.md");

            const md = await res.text();

            // Remove zero-width chars (marked issue)
            const clean = md.replace(/^[\u200B\u200C\u200D\u200E\u200F\uFEFF]/, "");

            section.innerHTML = marked.parse(clean);
        } catch (err) {
            section.innerHTML = "<p>Failed to load resume.</p>";
            console.error(err);
        }

        main.appendChild(section)
    });
</script>
