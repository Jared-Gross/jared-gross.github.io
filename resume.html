<script>
    function transitionTo(event, url) {
        event.preventDefault(); // Prevent full reload
        if (document.startViewTransition) {
            document.startViewTransition(() => {
                window.location.href = url; // Navigate with animation
            });
        } else {
            window.location.href = url; // Fallback
        }
    }

    document.addEventListener("DOMContentLoaded", function() {
        function setTheme(theme) {
            document.body.classList.remove("light", "dark");
            document.body.classList.add(theme);
            localStorage.setItem("theme", theme);

            const themeIcon = document.getElementById("theme-icon");
            themeIcon.innerText = theme === "dark" ? "dark_mode" : "light_mode";
        }

        const themeToggle = document.getElementById("theme-toggle");
        themeToggle.addEventListener("click", () => {
            const currentTheme = document.body.classList.contains("dark") ?
                "dark" :
                "light";
            const newTheme = currentTheme === "dark" ? "light" : "dark";
            setTheme(newTheme);
        });

        themeToggle.checked = localStorage.getItem("theme") === "dark";

        const savedTheme = localStorage.getItem("theme") || "light";
        setTheme(savedTheme);

        // Set theme to light when printing
        window.onbeforeprint = function() {
            document.body.classList.remove("light", "dark");
            document.body.classList.add("light");
        };
        window.onafterprint = function() {
            setTheme(localStorage.getItem("theme") || "light");
        };

        function prefetch(url) {
            if (prefetched.has(url)) return;
            prefetched.add(url);

            fetch(url, { priority: "low" }).catch(() => {});
        }

        document.querySelectorAll("nav a[onclick]").forEach((a) => {
            const url = a.getAttribute("onclick").match(/'(.*?)'/)?.[1];
            if (!url) return;

            a.addEventListener("mouseenter", () => prefetch(url), { passive: true });
            a.addEventListener("touchstart", () => prefetch(url), { passive: true });
        });
    });

    document.addEventListener("DOMContentLoaded", async () => {
        const main = document.querySelector("main");

        try {
            const res = await fetch("/RESUME.md");
            if (!res.ok) throw new Error("Failed to load RESUME.md");

            const md = await res.text();

            // Remove zero-width chars (marked issue)
            const clean = md.replace(/^[\u200B\u200C\u200D\u200E\u200F\uFEFF]/, "");

            main.innerHTML = marked.parse(clean);
        } catch (err) {
            main.innerHTML = "<p>Failed to load resume.</p>";
            console.error(err);
        }
    });
</script>
